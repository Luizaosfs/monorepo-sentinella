
  services:
    postgres:
      image: postgis/postgis:17-3.5
      ports:
        - "5432:5432"
      container_name: sentinella-postgres
      restart: unless-stopped
      environment:
        POSTGRES_DB: sentinella
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      volumes:
        - postgres_data:/var/lib/postgresql/data
      networks:
        - sentinella-network

    backend:
      build:
        context: .
        dockerfile: apps/backend/Dockerfile
      container_name: sentinella-api
      restart: unless-stopped
      depends_on:
        - postgres
      environment:
        NODE_ENV: production
        PORT: 3000
        DATABASE_URL: ${DATABASE_URL}
        SECRET_JWT: ${SECRET_JWT}
        CLIENT_URL: "https://sentinellamap.com.br"
        CANAL_CIDADAO_IP_SALT: ${CANAL_CIDADAO_IP_SALT}
        CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
        CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
        CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
        CLOUDINARY_UPLOAD_PRESET: "levantamento_manual"
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
        CNES_API_URL: "https://apidadosabertos.saude.gov.br"
        VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
        VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
        VAPID_SUBJECT: ${VAPID_SUBJECT}
      ports:
        - "3000:3000"
      networks:
        - sentinella-network

    frontend:
      build:
        context: .
        dockerfile: apps/frontend/Dockerfile
        args:
          VITE_API_URL: "https://sentinellamap.com.br/api"
          VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
          VITE_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
          VITE_CLOUDINARY_UPLOAD_PRESET: "levantamento_manual"
          VITE_SENTRY_DSN: ${VITE_SENTRY_DSN}
      container_name: sentinella-web
      restart: unless-stopped
      depends_on:
        - backend
      ports:
        - "8080:80"
      networks:
        - sentinella-network

  volumes:
    postgres_data:

  networks:
    sentinella-network:
