<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sentinella Map — Inspeção Urbana Inteligente</title>
    <meta name="description" content="Plataforma SaaS de inspeção aérea para identificação de pontos críticos urbanos. Usado por prefeituras e empresas." />
    <meta property="og:title" content="Sentinella Map" />
    <meta property="og:description" content="Inspeção urbana inteligente por drone" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!--
      Content Security Policy — ajustar APP_ORIGIN em produção se necessário.
      'unsafe-inline' em script-src e style-src é necessário para Vite (HMR em dev)
      e para bibliotecas de UI que injetam estilos em runtime (shadcn/Radix).
      connect-src cobre Supabase REST + Realtime (WSS) + Google Maps Geocoding + Sentry error reporting.
      img-src inclui data: e blob: para assinatura digital e pré-visualização de fotos.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https://*.cloudinary.com https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com https://server.arcgisonline.com https://services.arcgisonline.com https://maps.gstatic.com https://maps.googleapis.com https://api.qrserver.com;
      connect-src 'self' http://localhost:3333 http://177.7.37.14:3000 http://177.7.37.14:8080 https://sentinellamap.com.br https://www.sentinellamap.com.br http://177.7.37.14:3333  https://*.supabase.co wss://*.supabase.co https://maps.googleapis.com https://*.sentry.io https://o4511116110528512.ingest.us.sentry.io https://api.open-meteo.com;
      worker-src 'self' blob:;
      child-src 'none';
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
    " />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#2a9d8f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sentinella" />
    <link rel="apple-touch-icon" href="/pwa-icon-512.png" />
    <link rel="icon" href="/logo-icon.png" type="image/png" />
    <link rel="shortcut icon" href="/logo-icon.png" type="image/png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
