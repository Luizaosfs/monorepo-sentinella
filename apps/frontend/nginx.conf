server {
  listen 80;
  server_name _;

  client_max_body_size 20m;

  root /usr/share/nginx/html;
  index index.html;

  # Assets com hash de conteúdo: cache permanente, sem fallback para index.html.
  # Se o arquivo não existe (deploy novo mudou o hash), retorna 404 real.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html nunca pode ser cacheado — garante que o browser sempre busca a versão mais recente.
  location = /index.html {
    try_files $uri =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA: rotas de aplicação fazem fallback para index.html.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
