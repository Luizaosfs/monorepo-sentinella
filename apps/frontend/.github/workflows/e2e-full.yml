# Suite E2E mais ampla (Chromium) — agendada ou manual.
# Requer o mesmo setup que o job e2e-smoke em ci.yml (vars.E2E_CI_ENABLED + secrets).

name: E2E full

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: e2e-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-full:
    name: Playwright (Chromium, suite completa)
    runs-on: ubuntu-latest
    if: vars.E2E_CI_ENABLED == 'true'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Criar .env.e2e a partir de secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.E2E_VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.E2E_VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Defina secrets E2E_VITE_SUPABASE_URL e E2E_VITE_SUPABASE_ANON_KEY."
            exit 1
          fi
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env.e2e
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env.e2e

      - name: Suite completa (Chromium)
        run: npm run test:e2e:ci-full

      - name: Upload report Playwright
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 14
