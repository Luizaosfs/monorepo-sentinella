# =============================================================================
# P1-1: Custom Access Token Hook — enriquecimento de JWT com claims de tenant
#
# ATIVAÇÃO LOCAL: esta entrada habilita o hook no ambiente de desenvolvimento.
# ATIVAÇÃO HOSTED: Dashboard → Authentication → Hooks → Custom Access Token
#   URI: pg-functions://postgres/public/custom_access_token_hook
# =============================================================================
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# Edge Function de provisionamento de usuários — chamada pelo AdminUsuarios.tsx com JWT do chamador.
# verify_jwt=false: a função verifica o JWT manualmente e checa o papel (admin/supervisor).
[functions.criar-usuario]
verify_jwt = false

[functions.pluvio-risco-daily]
verify_jwt = false

# Edge Function para marcar SLAs vencidos automaticamente
# Agendar no Supabase Dashboard → Edge Functions → Cron: "*/15 * * * *"
[functions.sla-marcar-vencidos]
verify_jwt = false

# Web Push quando SLA ≤ 1h — cron horário (service role) + invoke em usePainelSLA (cliente autenticado).
# Sem esta entrada o padrão do Supabase é verify_jwt=true e o gateway retorna 401 se o JWT estiver
# ausente/expirado ou em chamadas que só enviam apikey. O handler já usa SERVICE_ROLE no servidor.
# Após alterar: `supabase functions deploy sla-push-critico` (ou deploy pelo CI).
[functions.sla-push-critico]
verify_jwt = false

# Edge Function de retenção — QW-10C/QW-10D
# Agendar no Supabase Dashboard → Edge Functions → Cron: "0 2 * * *"
# Executar sempre com dry_run=true antes de aplicar em produção.
# verify_jwt=false: cron interno — acesso externo bloqueado por CRON_SECRET no header x-cron-secret
[functions.limpeza-retencao-logs]
verify_jwt = false

# Edge Function de health check — QW-12
# Agendar no Supabase Dashboard → Edge Functions → Cron: "*/30 * * * *"
# verify_jwt = true: acesso restrito a admins autenticados — evita exposição de config sensível
[functions.health-check]
verify_jwt = true

# Edge Function worker de jobs assíncronos — QW-13
# Agendar no Supabase Dashboard → Edge Functions → Cron: "*/1 * * * *"
# verify_jwt=false: cron interno — acesso externo bloqueado por CRON_SECRET no header x-cron-secret
[functions.job-worker]
verify_jwt = false

# Edge Function de snapshot mensal de billing — QW-15
# Agendar no Supabase Dashboard → Edge Functions → Cron: "0 4 1 * *" (1º dia do mês às 04:00 UTC)
# verify_jwt=false: cron interno — acesso externo bloqueado por CRON_SECRET no header x-cron-secret
# IMPORTANTE: adicionar CRON_SECRET nos secrets da Edge Function no Supabase Dashboard
[functions.billing-snapshot]
verify_jwt = false

# verify_jwt = true: upload restrito a usuários autenticados — impede upload anônimo ao Cloudinary
[functions.cloudinary-upload-image]
verify_jwt = true

[functions.identify-larva]
verify_jwt = true

[functions.geocode-regioes]
verify_jwt = true

# Chamada pelo dashboard (invoke) + CORS preflight OPTIONS sem JWT no gateway.
# Autenticação validada no handler (sessão ou JWT service_role do cron).
[functions.resumo-diario]
verify_jwt = false

# Invocada manualmente por admin para purgar arquivos Cloudinary órfãos.
# verify_jwt=true: requer JWT de papel 'admin' — nunca exposta a cron anônimo.
[functions.cloudinary-cleanup-orfaos]
verify_jwt = true

# Deleção de imagem Cloudinary — invocada pelo frontend autenticado.
[functions.cloudinary-delete-image]
verify_jwt = true

# Sincronização CNES/DATASUS — invocada pelo frontend (admin) + cron 03:00 UTC.
# verify_jwt=false: cron interno usa service_role; handler valida authorization internamente.
[functions.cnes-sync]
verify_jwt = false


# Exportação do boletim LIRAa em HTML — invocada pelo frontend autenticado.
[functions.liraa-export]
verify_jwt = true

# Web Push para gestor quando foco de origem_tipo='cidadao' é criado.
# Chamada pelo job-worker (cron) com service_role — nunca diretamente pelo frontend.
[functions.notif-canal-cidadao]
verify_jwt = false

# Relatório semanal por e-mail via Resend — cron seg 08:00 UTC com service_role.
[functions.relatorio-semanal]
verify_jwt = false

# Worker de score territorial — cron a cada 5 min + diário 07:00 UTC com service_role.
[functions.score-worker]
verify_jwt = false

# Triagem IA pós-voo (cluster + Claude Haiku) — invocada pelo frontend autenticado.
[functions.triagem-ia-pos-voo]
verify_jwt = true

# Upload de evidências de vistoria ao Cloudinary — invocada pelo frontend autenticado.
# verify_jwt=false: o gateway legado rejeita JWT ES256; a função valida com auth.getUser(jwt).
[functions.upload-evidencia]
verify_jwt = false

# Insights regionais via Claude Haiku — invocada pelo frontend autenticado (analista_regional/admin).
# verify_jwt=false: a função valida JWT internamente + checa papeis_usuarios.papel.
[functions.insights-regional]
verify_jwt = false

# Gráficos regionais via Claude Haiku (tool_use) — mesma auth que insights-regional.
[functions.graficos-regionais]
verify_jwt = false
